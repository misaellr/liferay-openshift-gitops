# =============================================================================
# Base Liferay Config (shared across all environments)
# =============================================================================
# Flat keys: chart deployed directly from OCI (L-013, L-027)
# No OpenSearch init container (using built-in elasticsearch7 connector)
# License mount from Secret (L-036: must be present at first boot)

image:
  tag: "2025.q4.12"

# --- License (L-036: present before first boot) ---
customEnv:
  x-license:
    - name: LIFERAY_DISABLE_TRIAL_LICENSE
      value: "true"

customVolumeMounts:
  x-license:
    - mountPath: /etc/liferay/mount/files/deploy
      name: license

customVolumes:
  x-license:
    - name: license
      secret:
        secretName: liferay-license
        items:
          - key: license.xml
            path: license.xml

# --- Probes (generous for first boot) ---
startupProbe:
  failureThreshold: 180
  initialDelaySeconds: 120
  periodSeconds: 10
livenessProbe:
  initialDelaySeconds: 0
  periodSeconds: 30
readinessProbe:
  initialDelaySeconds: 0
  periodSeconds: 10
