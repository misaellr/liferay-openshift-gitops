# =============================================================================
# OpenShift Dev Environment - Liferay DXP 2025.q4.12
# =============================================================================
# Adapted from openshift-cloud working config for self-managed OCP.
# Flat keys (L-013, L-027). nonroot-v2 SCC with UID 1000.
# Elasticsearch7 connector (built-in, no module downloads).
# No web.server.protocol=https (L-035).
# =============================================================================

# --- SCC: nonroot-v2 (UID 1000) ---
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  fsGroup: 1000
  fsGroupChangePolicy: Always

securityContext:
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# --- SCC RBAC ---
global:
  liferayServiceAccount:
    role:
      rules:
        - apiGroups: [""]
          resources: ["configmaps"]
          verbs: ["get", "list", "watch", "create", "update", "patch"]
        - apiGroups: ["security.openshift.io"]
          resourceNames: ["nonroot-v2"]
          resources: ["securitycontextconstraints"]
          verbs: ["use"]

# --- Storage ---
volumeClaimTemplates:
  - metadata:
      name: liferay-persistent-volume
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: gp3-csi
      resources:
        requests:
          storage: 20Gi
overlay:
  enabled: false

# --- Credentials (L-031: pgdb not liferay-db) ---
customEnvFrom:
  x-managed-services:
    - secretRef:
        name: managed-service-details

# --- Portal Properties ---
# No web.server.protocol=https (L-035: breaks startup probes)
# company.default.web.id set to Route hostname (L-037)
portalProperties: |
  jdbc.default.driverClassName=org.postgresql.Driver
  jdbc.default.url=jdbc:postgresql://${env.DATABASE_ENDPOINT}:${env.DATABASE_PORT}/lportal?useUnicode=true&characterEncoding=UTF-8&useFastDateParsing=false
  jdbc.default.username=${env.DATABASE_USERNAME}
  jdbc.default.password=${env.DATABASE_PASSWORD}
  web.server.forwarded.protocol.enabled=true
  web.server.forwarded.host.enabled=true
  web.server.forwarded.port.enabled=true
  proxy.forwarded.for.header=X-Forwarded-For
  proxy.forwarded.host.header=X-Forwarded-Host
  proxy.forwarded.proto.header=X-Forwarded-Proto
  company.default.web.id=REPLACE_WITH_ROUTE_HOSTNAME
  virtual.hosts.default.site.name=Guest

# --- Elasticsearch7 OSGi Config (from openshift-cloud, proven) ---
configmap:
  data:
    com.liferay.portal.search.elasticsearch7.configuration.ElasticsearchConfiguration.config: |
      remoteClusterConnectionId="REMOTE"
    com.liferay.portal.search.elasticsearch7.configuration.ElasticsearchConnectionConfiguration-REMOTE.config: |
      active=B"true"
      authenticationEnabled=B"false"
      connectionId="REMOTE"
      httpSSLEnabled=B"false"
      networkHostAddresses=["http://esearch.liferay-dev.svc:9200"]
      password=""
      username=""

# --- Mount ES config ---
customVolumeMounts:
  x-elasticsearch:
    - mountPath: /opt/liferay/osgi/configs/com.liferay.portal.search.elasticsearch7.configuration.ElasticsearchConfiguration.config
      name: liferay-configmap
      subPath: com.liferay.portal.search.elasticsearch7.configuration.ElasticsearchConfiguration.config
    - mountPath: /opt/liferay/osgi/configs/com.liferay.portal.search.elasticsearch7.configuration.ElasticsearchConnectionConfiguration-REMOTE.config
      name: liferay-configmap
      subPath: com.liferay.portal.search.elasticsearch7.configuration.ElasticsearchConnectionConfiguration-REMOTE.config

# --- Bundle Deny List (deny OpenSearch, keep Elasticsearch) ---
portalBundleDenyList:
  - com.liferay.portal.search.elasticsearch.cross.cluster.replication.impl
  - com.liferay.portal.search.elasticsearch.monitoring.web
  - com.liferay.portal.search.opensearch2.api
  - com.liferay.portal.search.opensearch2.impl
  - com.liferay.portal.search.learning.to.rank.api
  - com.liferay.portal.search.learning.to.rank.impl

# --- Resources (dev) ---
resources:
  limits:
    cpu: "2"
    memory: 6Gi
  requests:
    cpu: 100m
    memory: 1Gi

replicaCount: 1
