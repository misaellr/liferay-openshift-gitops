# OpenShift Dev - Liferay DXP 2025.q4.12 (embedded search)
# OpenSearch connector modules incompatible with q4.12 runtime.
# Using embedded search until compatible modules are available.

image:
  tag: 2025.q4.12
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  fsGroup: 1000
  fsGroupChangePolicy: Always
securityContext:
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
volumeClaimTemplates:
- metadata:
    name: liferay-persistent-volume
  spec:
    accessModes:
    - ReadWriteOnce
    storageClassName: gp3-csi
    resources:
      requests:
        storage: 20Gi
overlay:
  enabled: false
customEnv:
  x-openshift-db:
  - name: DATABASE_ENDPOINT
    valueFrom:
      secretKeyRef:
        name: pgdb-pguser-liferay
        key: host
  - name: DATABASE_PORT
    valueFrom:
      secretKeyRef:
        name: pgdb-pguser-liferay
        key: port
  - name: DATABASE_USERNAME
    valueFrom:
      secretKeyRef:
        name: pgdb-pguser-liferay
        key: user
  - name: DATABASE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: pgdb-pguser-liferay
        key: password
  x-license:
  - name: LIFERAY_DISABLE_TRIAL_LICENSE
    value: 'true'
portalProperties: 'jdbc.default.driverClassName=org.postgresql.Driver

  jdbc.default.url=jdbc:postgresql://${env.DATABASE_ENDPOINT}:${env.DATABASE_PORT}/lportal?useUnicode=true&characterEncoding=UTF-8&useFastDateParsing=false

  jdbc.default.username=${env.DATABASE_USERNAME}

  jdbc.default.password=${env.DATABASE_PASSWORD}

  proxy.forwarded.for.header=X-Forwarded-For

  proxy.forwarded.host.header=X-Forwarded-Host

  proxy.forwarded.proto.header=X-Forwarded-Proto

  web.server.forwarded.port.enabled=true

  web.server.forwarded.protocol.enabled=true

  web.server.protocol=https

  web.server.https.port=443

  company.default.web.id=liferay-default-liferay-dev.apps.openshift.misaelneto.com

  virtual.hosts.default.site.name=Guest

  '
customVolumeMounts:
  x-license:
  - mountPath: /etc/liferay/mount/files/deploy
    name: license
customVolumes:
  x-license:
  - name: license
    secret:
      secretName: liferay-license
      items:
      - key: license.xml
        path: license.xml
resources:
  limits:
    cpu: '2'
    memory: 6Gi
  requests:
    cpu: 100m
    memory: 1Gi
startupProbe:
  failureThreshold: 180
  initialDelaySeconds: 120
  periodSeconds: 10
livenessProbe:
  initialDelaySeconds: 0
  periodSeconds: 30
readinessProbe:
  initialDelaySeconds: 0
  periodSeconds: 10
replicaCount: 1
global:
  liferayServiceAccount:
    role:
      rules:
      - apiGroups:
        - ''
        resources:
        - configmaps
        verbs:
        - '*'
      - apiGroups:
        - security.openshift.io
        resourceNames:
        - nonroot-v2
        resources:
        - securitycontextconstraints
        verbs:
        - use
